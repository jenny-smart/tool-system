name: Scheduled Monthly Jobs

on:
  workflow_dispatch:
    inputs:
      target:
        description: "要執行的任務"
        required: true
        default: "half_month_orders_2"
        type: choice
        options:
          - all
          - half_month_orders_1
          - half_month_orders_2
          - refund_report
          - prepaid_report
          - stored_value_settlement
          - stored_value_prepaid
      period:
        description: "期別（例如：202605-1 或 202605-2，上下半月訂單才需要填）"
        required: false
        default: ""
      folder_id:
        description: "月排程總根目錄 ID（留空使用環境變數 MONTHLY_ROOT_FOLDER_ID）"
        required: false
        default: ""
      area:
        description: "執行區域（all / 台北 / 台中 / 桃園 / 新竹 / 高雄）"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  run-monthly-jobs:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      TOOLS_APP_LOG_SPREADSHEET_ID: ${{ secrets.TOOLS_APP_LOG_SPREADSHEET_ID || secrets.MASTER_SPREADSHEET_ID }}
      MONTHLY_ROOT_FOLDER_ID: ${{ secrets.MONTHLY_ROOT_FOLDER_ID }}
      MONTHLY_ORDERS_ROOT_FOLDER_ID: ${{ secrets.MONTHLY_ORDERS_ROOT_FOLDER_ID }}

      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}
      TAOYUAN_EMAIL: ${{ secrets.TAOYUAN_EMAIL }}
      TAOYUAN_PASSWORD: ${{ secrets.TAOYUAN_PASSWORD }}
      HSINCHU_EMAIL: ${{ secrets.HSINCHU_EMAIL }}
      HSINCHU_PASSWORD: ${{ secrets.HSINCHU_PASSWORD }}
      KAOHSIUNG_EMAIL: ${{ secrets.KAOHSIUNG_EMAIL }}
      KAOHSIUNG_PASSWORD: ${{ secrets.KAOHSIUNG_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run monthly task
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          TASK="${{ github.event.inputs.target }}"
          PERIOD="${{ github.event.inputs.period }}"
          FOLDER_ID="${{ github.event.inputs.folder_id }}"
          AREA="${{ github.event.inputs.area }}"

          # folder_id 優先用手動輸入，否則用環境變數
          if [ -z "$FOLDER_ID" ]; then
            FOLDER_ID="$MONTHLY_ROOT_FOLDER_ID"
          fi

          START_TS=$(date +%s)
          START_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")

          CMD="python -u -m tools.scheduled_monthly.scheduler --target '$TASK' --folder-id '$FOLDER_ID' --area '$AREA'"

          if [ -n "$PERIOD" ]; then
            CMD="$CMD --period '$PERIOD'"
          fi

          echo "===== 月排程 ====="
          echo "Task: $TASK"
          echo "Period: $PERIOD"
          echo "Area: $AREA"
          echo "Command: $CMD"

          bash -lc "$CMD" > "$LOG_DIR/monthly_${TASK}.log" 2>&1
          EXIT_CODE=$?

          END_TS=$(date +%s)
          END_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")
          DURATION=$((END_TS - START_TS))

          echo "$EXIT_CODE" > "$LOG_DIR/monthly_${TASK}.exit"

          if [ "$EXIT_CODE" -eq 0 ]; then
            STATUS="success"
          else
            STATUS="failed"
          fi

          echo "{
            \"job_name\": \"monthly_${TASK}\",
            \"status\": \"$STATUS\",
            \"exit_code\": $EXIT_CODE,
            \"started_at\": \"$START_TEXT\",
            \"finished_at\": \"$END_TEXT\",
            \"duration_seconds\": $DURATION
          }" > "$LOG_DIR/monthly_${TASK}.json"

          cat "$LOG_DIR/monthly_${TASK}.log"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "❌ 月排程失敗 exit=$EXIT_CODE"
            exit 1
          else
            echo "✅ 月排程完成"
          fi

      - name: Commit logs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f logs

          if git diff --cached --quiet; then
            echo "No log changes"
          else
            git commit -m "Update monthly logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

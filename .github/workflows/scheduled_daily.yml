name: Scheduled Daily Jobs

on:
  schedule:
    - cron: "0 17 * * *"   # 台灣 01:00 日排程：排班統計表
    - cron: "10 17 * * *"  # 台灣 01:10 日排程：專員班表
    - cron: "20 17 * * *"  # 台灣 01:20 日排程：當月次月訂單
    - cron: "30 17 * * *"  # 台灣 01:30 日排程：專員個資
    - cron: "0 18 * * *"   # 台灣 02:00 寄通知
    - cron: "0 21 * * *"   # 台灣 05:00 外場排程：彙整資料

  workflow_dispatch:
    inputs:
      target:
        description: "要執行的任務"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - schedule_report
          - staff_schedule
          - orders_report
          - staff_info
          - field_all
          - field_schedule_stats
          - field_staff_schedule
          - field_orders
          - field_staff_profile
          - notify

permissions:
  contents: write

jobs:
  run-daily-jobs:
    runs-on: ubuntu-latest

    env:
      DAILY_ROOT_FOLDER_ID: ${{ secrets.DAILY_ROOT_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      TOOLS_APP_LOG_SPREADSHEET_ID: ${{ secrets.TOOLS_APP_LOG_SPREADSHEET_ID }}
      MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}

      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}

      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      NOTIFY_PASSWORD: ${{ secrets.NOTIFY_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Decide task
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK="${{ github.event.inputs.target }}"
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")

            if [ "$HOUR" = "17" ] && [ "$MIN" = "00" ]; then
              TASK="schedule_report"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "10" ]; then
              TASK="staff_schedule"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "20" ]; then
              TASK="orders_report"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "30" ]; then
              TASK="staff_info"
            elif [ "$HOUR" = "18" ] && [ "$MIN" = "00" ]; then
              TASK="notify"
            elif [ "$HOUR" = "21" ] && [ "$MIN" = "00" ]; then
              TASK="field_all"
            else
              TASK="none"
            fi
          fi

          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "TASK=$TASK"

      - name: Run daily task
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          TASK="${{ steps.decide.outputs.task }}"
          FAILED=0

          run_one () {
            NAME="$1"
            CMD="$2"

            echo "===== $NAME ====="
            echo "Command: $CMD"

            START_TS=$(date +%s)
            START_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")

            bash -lc "$CMD" > "$LOG_DIR/$NAME.log" 2>&1
            EXIT_CODE=$?

            END_TS=$(date +%s)
            END_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")
            DURATION=$((END_TS - START_TS))

            echo "$EXIT_CODE" > "$LOG_DIR/$NAME.exit"

            if [ "$EXIT_CODE" -eq 0 ]; then
              STATUS="success"
            else
              STATUS="failed"
            fi

            echo "{
              \"job_name\": \"$NAME\",
              \"status\": \"$STATUS\",
              \"exit_code\": $EXIT_CODE,
              \"started_at\": \"$START_TEXT\",
              \"finished_at\": \"$END_TEXT\",
              \"duration_seconds\": $DURATION
            }" > "$LOG_DIR/$NAME.json"

            cat "$LOG_DIR/$NAME.log"

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "❌ $NAME failed with exit code $EXIT_CODE"
              FAILED=1
            else
              echo "✅ $NAME success"
            fi

            return 0
          }

          if [ "$TASK" = "schedule_report" ] || [ "$TASK" = "all" ]; then
            run_one "schedule_report" "python -u tools/scheduled_daily/scheduler.py --target schedule_report --folder-id '$DAILY_ROOT_FOLDER_ID'"
          fi

          if [ "$TASK" = "staff_schedule" ] || [ "$TASK" = "all" ]; then
            run_one "staff_schedule" "python -u tools/scheduled_daily/scheduler.py --target staff_schedule --folder-id '$DAILY_ROOT_FOLDER_ID'"
          fi

          if [ "$TASK" = "orders_report" ] || [ "$TASK" = "all" ]; then
            run_one "orders_report" "python -u tools/scheduled_daily/scheduler.py --target orders_report --folder-id '$DAILY_ROOT_FOLDER_ID'"
          fi

          if [ "$TASK" = "staff_info" ] || [ "$TASK" = "all" ]; then
            run_one "staff_info" "python -u tools/scheduled_daily/scheduler.py --target staff_info --folder-id '$DAILY_ROOT_FOLDER_ID'"
          fi

          if [ "$TASK" = "field_schedule_stats" ] || [ "$TASK" = "field_all" ] || [ "$TASK" = "all" ]; then
            run_one "field_schedule_stats" "python -u -m tools.field_management.scheduler --target schedule_stats --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_staff_schedule" ] || [ "$TASK" = "field_all" ] || [ "$TASK" = "all" ]; then
            run_one "field_staff_schedule" "python -u -m tools.field_management.scheduler --target staff_schedule --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_orders" ] || [ "$TASK" = "field_all" ] || [ "$TASK" = "all" ]; then
            run_one "field_orders" "python -u -m tools.field_management.scheduler --target orders --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_staff_profile" ] || [ "$TASK" = "field_all" ] || [ "$TASK" = "all" ]; then
            run_one "field_staff_profile" "python -u -m tools.field_management.scheduler --target staff_profile --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "notify" ] || [ "$TASK" = "all" ]; then
            run_one "send_daily_result" "python -u tools/notify/send_daily_result.py"
          fi

          if [ "$TASK" = "none" ]; then
            echo "No matching task."
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more scheduled jobs failed."
            exit 1
          fi

      - name: Commit logs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f logs

          if git diff --cached --quiet; then
            echo "No log changes"
          else
            git commit -m "Update daily logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

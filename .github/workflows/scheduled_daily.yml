name: Scheduled Daily Jobs

on:
  schedule:
    # 台灣 01:00
    - cron: "0 17 * * *"

    # 台灣 01:10
    - cron: "10 17 * * *"

    # 台灣 01:20
    - cron: "20 17 * * *"

    # 台灣 01:30
    - cron: "30 17 * * *"

    # 台灣 02:00 通知
    - cron: "0 18 * * *"

  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run Daily Jobs
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          HOUR=$(date -u +"%H")
          MIN=$(date -u +"%M")

          echo "UTC TIME = $HOUR:$MIN"

          if [ "$HOUR" = "17" ] && [ "$MIN" = "00" ]; then
            python tools/scheduled_daily/schedule_report.py
          fi

          if [ "$HOUR" = "17" ] && [ "$MIN" = "10" ]; then
            python tools/scheduled_daily/staff_schedule.py
          fi

          if [ "$HOUR" = "17" ] && [ "$MIN" = "20" ]; then
            python tools/scheduled_daily/order_report.py
          fi

          if [ "$HOUR" = "17" ] && [ "$MIN" = "30" ]; then
            python tools/scheduled_daily/staff_info.py
          fi

          if [ "$HOUR" = "18" ] && [ "$MIN" = "00" ]; then
            python tools/notify/send_daily_result.py
          fi

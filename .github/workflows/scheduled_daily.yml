name: Scheduled Daily Jobs

on:
  schedule:
    - cron: "0 17 * * *"   # 台灣 01:00 排班統計表
    - cron: "10 17 * * *"  # 台灣 01:10 專員班表
    - cron: "20 17 * * *"  # 台灣 01:20 當月訂單資料
    - cron: "30 17 * * *"  # 台灣 01:30 專員個資＋訂單截取
    - cron: "0 18 * * *"   # 台灣 02:00 寄通知
    - cron: "0 21 * * *"   # 台灣 05:00 四個外場流程一次跑

  workflow_dispatch:
    inputs:
      target:
        description: "要執行的任務"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - schedule_stats
          - staff_schedule
          - orders
          - staff_profile
          - notify

permissions:
  contents: write

jobs:
  run-daily-jobs:
    runs-on: ubuntu-latest

    env:
      DAILY_ROOT_FOLDER_ID: ${{ secrets.DAILY_ROOT_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}

      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      NOTIFY_PASSWORD: ${{ secrets.NOTIFY_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Decide task
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK="${{ github.event.inputs.target }}"
          else
            HOUR=$(date -u +"%H")
            MIN=$(date -u +"%M")

            if [ "$HOUR" = "17" ] && [ "$MIN" = "00" ]; then
              TASK="schedule_stats"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "10" ]; then
              TASK="staff_schedule"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "20" ]; then
              TASK="orders"
            elif [ "$HOUR" = "17" ] && [ "$MIN" = "30" ]; then
              TASK="staff_profile"
            elif [ "$HOUR" = "18" ] && [ "$MIN" = "00" ]; then
              TASK="notify"
            elif [ "$HOUR" = "21" ] && [ "$MIN" = "00" ]; then
              TASK="all"
            else
              TASK="none"
            fi
          fi

          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "TASK=$TASK"

      - name: Run daily task
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          TASK="${{ steps.decide.outputs.task }}"

          run_one () {
            NAME="$1"
            CMD="$2"

            echo "===== $NAME ====="
            echo "Command: $CMD"

            bash -lc "$CMD" > "$LOG_DIR/$NAME.log" 2>&1
            EXIT_CODE=$?

            echo "$EXIT_CODE" > "$LOG_DIR/$NAME.exit"

            cat "$LOG_DIR/$NAME.log"

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "❌ $NAME failed with exit code $EXIT_CODE"
            else
              echo "✅ $NAME success"
            fi

            return 0
          }

          if [ "$TASK" = "schedule_stats" ] || [ "$TASK" = "all" ]; then
            run_one "schedule_stats" "python -u tools/field_management/scheduler.py --target schedule_stats --date '$TODAY' --system-name '外場日排程系統'"
          fi

          if [ "$TASK" = "staff_schedule" ] || [ "$TASK" = "all" ]; then
            run_one "staff_schedule" "python -u tools/field_management/scheduler.py --target staff_schedule --date '$TODAY' --system-name '外場日排程系統'"
          fi

          if [ "$TASK" = "orders" ] || [ "$TASK" = "all" ]; then
            run_one "orders" "python -u tools/field_management/scheduler.py --target orders --date '$TODAY' --system-name '外場日排程系統'"
          fi

          if [ "$TASK" = "staff_profile" ] || [ "$TASK" = "all" ]; then
            run_one "staff_profile" "python -u tools/field_management/scheduler.py --target staff_profile --date '$TODAY' --system-name '外場日排程系統'"
          fi

          if [ "$TASK" = "notify" ] || [ "$TASK" = "all" ]; then
            run_one "send_daily_result" "python -u tools/notify/send_daily_result.py"
          fi

          if [ "$TASK" = "none" ]; then
            echo "No matching task."
          fi

      - name: Commit logs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f logs

          if git diff --cached --quiet; then
            echo "No log changes"
          else
            git commit -m "Update daily logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

name: Scheduled Field Jobs

on:
  schedule:
    - cron: "0 21 * * *"   # 台灣 05:00 外場排程：彙整資料

  workflow_dispatch:
    inputs:
      target:
        description: "要執行的任務"
        required: true
        default: "field_all"
        type: choice
        options:
          - field_all
          - field_schedule_stats
          - field_staff_schedule
          - field_orders
          - field_staff_profile

permissions:
  contents: write

jobs:
  run-field-jobs:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      TOOLS_APP_LOG_SPREADSHEET_ID: ${{ secrets.TOOLS_APP_LOG_SPREADSHEET_ID || secrets.MASTER_SPREADSHEET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Decide task
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK="${{ github.event.inputs.target }}"
          else
            TASK="field_all"
          fi

          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "TASK=$TASK"

      - name: Run field task
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          TASK="${{ steps.decide.outputs.task }}"
          FAILED=0

          run_one () {
            NAME="$1"
            CMD="$2"

            echo "===== $NAME ====="
            echo "Command: $CMD"

            START_TS=$(date +%s)
            START_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")

            bash -lc "$CMD" > "$LOG_DIR/$NAME.log" 2>&1
            EXIT_CODE=$?

            END_TS=$(date +%s)
            END_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")
            DURATION=$((END_TS - START_TS))

            echo "$EXIT_CODE" > "$LOG_DIR/$NAME.exit"

            if [ "$EXIT_CODE" -eq 0 ]; then
              STATUS="success"
            else
              STATUS="failed"
            fi

            echo "{
              \"job_name\": \"$NAME\",
              \"status\": \"$STATUS\",
              \"exit_code\": $EXIT_CODE,
              \"started_at\": \"$START_TEXT\",
              \"finished_at\": \"$END_TEXT\",
              \"duration_seconds\": $DURATION
            }" > "$LOG_DIR/$NAME.json"

            cat "$LOG_DIR/$NAME.log"

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "❌ $NAME failed with exit code $EXIT_CODE"
              FAILED=1
            else
              echo "✅ $NAME success"
            fi

            return 0
          }

          if [ "$TASK" = "field_schedule_stats" ] || [ "$TASK" = "field_all" ]; then
            run_one "field_schedule_stats" "python -u -m tools.field_management.scheduler --target schedule_stats --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_staff_schedule" ] || [ "$TASK" = "field_all" ]; then
            run_one "field_staff_schedule" "python -u -m tools.field_management.scheduler --target staff_schedule --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_orders" ] || [ "$TASK" = "field_all" ]; then
            run_one "field_orders" "python -u -m tools.field_management.scheduler --target orders --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$TASK" = "field_staff_profile" ] || [ "$TASK" = "field_all" ]; then
            run_one "field_staff_profile" "python -u -m tools.field_management.scheduler --target staff_profile --date '$TODAY' --system-name '外場排程系統'"
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more field jobs failed."
          fi

      - name: Commit logs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f logs

          if git diff --cached --quiet; then
            echo "No log changes"
          else
            git commit -m "Update field logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

name: Performance Report

on:
  schedule:
    - cron: "0 16 * * *"  # εèΑγ¹Θ 00:00
    - cron: "0 0 * * *"   # εèΑγ¹Θ 08:00
    - cron: "0 4 * * *"   # εèΑγ¹Θ 12:00
    - cron: "0 10 * * *"  # εèΑγ¹Θ 18:00

  workflow_dispatch:

permissions:
  contents: write

jobs:
  performance-report:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      TAIPEI_EMAIL: ${{ secrets.TAIPEI_EMAIL }}
      TAIPEI_PASSWORD: ${{ secrets.TAIPEI_PASSWORD }}
      TAICHUNG_EMAIL: ${{ secrets.TAICHUNG_EMAIL }}
      TAICHUNG_PASSWORD: ${{ secrets.TAICHUNG_PASSWORD }}

      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      NOTIFY_PASSWORD: ${{ secrets.NOTIFY_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run performance report
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          python tools/scheduled_daily/performance_report.py schedule true > "$LOG_DIR/performance_report.log" 2>&1
          EXIT_CODE=$?

          echo "$EXIT_CODE" > "$LOG_DIR/performance_report.exit"

          cat "$LOG_DIR/performance_report.log"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "βù¨ performance_report failed"
            exit "$EXIT_CODE"
          fi

      - name: Commit dashboard data and logs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard_data/latest logs

          if git diff --cached --quiet; then
            echo "No report or log changes"
          else
            git commit -m "Update performance report data and logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

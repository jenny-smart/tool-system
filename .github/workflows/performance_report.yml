name: Performance Report

on:
  schedule:
    # εèΑγ¹Θ 00:00
    - cron: "0 16 * * *"

    # εèΑγ¹Θ 08:00
    - cron: "0 0 * * *"

    # εèΑγ¹Θ 12:00
    - cron: "0 4 * * *"

    # εèΑγ¹Θ 18:00
    - cron: "0 10 * * *"

  workflow_dispatch:

jobs:
  performance-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run Performance Report
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python tools/scheduled_daily/performance_report.py

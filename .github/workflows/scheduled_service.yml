name: Scheduled Service Jobs

on:
  schedule:
    - cron: "0 22 * * *"  # 台灣時間 06:00（UTC 22:00 前一天）

  workflow_dispatch:
    inputs:
      target:
        description: "要執行的任務"
        required: true
        default: "service_all"
        type: choice
        options:
          - service_all
          - service_schedule_stats
          - service_daily_report
          - service_revenue

permissions:
  contents: write

jobs:
  run-service-jobs:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT:         ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      TOOLS_APP_LOG_SPREADSHEET_ID:   ${{ secrets.TOOLS_APP_LOG_SPREADSHEET_ID || secrets.MASTER_SPREADSHEET_ID }}
      LEMON_TARGET_FILE_ID:           ${{ secrets.LEMON_TARGET_FILE_ID }}
      LOG_SPREADSHEET_ID:             ${{ secrets.LOG_SPREADSHEET_ID }}
      GMAIL_USER:                     ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD:             ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_EMAIL:                   ${{ secrets.NOTIFY_EMAIL }}
      NOTIFY_PASSWORD:                ${{ secrets.NOTIFY_PASSWORD }}
      NOTIFY_TO:                      ${{ secrets.NOTIFY_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Decide task
        id: decide
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK="${{ github.event.inputs.target }}"
          else
            TASK="service_all"
          fi
          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "TASK=$TASK"

      - name: Run service task
        shell: bash
        run: |
          set +e

          TODAY=$(TZ=Asia/Taipei date +"%Y%m%d")
          LOG_DIR="logs/$TODAY"
          mkdir -p "$LOG_DIR"

          TASK="${{ steps.decide.outputs.task }}"
          FAILED=0

          run_one () {
            NAME="$1"
            CMD="$2"

            echo "===== $NAME ====="
            echo "Command: $CMD"

            START_TS=$(date +%s)
            START_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")

            bash -lc "$CMD" > "$LOG_DIR/$NAME.log" 2>&1
            EXIT_CODE=$?

            END_TS=$(date +%s)
            END_TEXT=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M:%S")
            DURATION=$((END_TS - START_TS))

            echo "$EXIT_CODE" > "$LOG_DIR/$NAME.exit"

            if [ "$EXIT_CODE" -eq 0 ]; then
              STATUS="success"
            else
              STATUS="failed"
            fi

            echo "{
              \"job_name\": \"$NAME\",
              \"status\": \"$STATUS\",
              \"exit_code\": $EXIT_CODE,
              \"started_at\": \"$START_TEXT\",
              \"finished_at\": \"$END_TEXT\",
              \"duration_seconds\": $DURATION
            }" > "$LOG_DIR/$NAME.json"

            cat "$LOG_DIR/$NAME.log"

            if [ "$EXIT_CODE" -ne 0 ]; then
              echo "❌ $NAME failed with exit code $EXIT_CODE"
              FAILED=1
            else
              echo "✅ $NAME success"
            fi

            return 0
          }

          # Step 1：更新排班統計表
          if [ "$TASK" = "service_schedule_stats" ] || [ "$TASK" = "service_all" ]; then
            run_one "service_schedule_stats" \
              "python -u -m tools.service_management.service_schedule --step 1"
          fi

          # Step 2：更新每日回報
          if [ "$TASK" = "service_daily_report" ] || [ "$TASK" = "service_all" ]; then
            run_one "service_daily_report" \
              "python -u -m tools.service_management.service_schedule --step 2"
          fi

          # Step 3：更新前一天營業分數及營業額
          if [ "$TASK" = "service_revenue" ] || [ "$TASK" = "service_all" ]; then
            run_one "service_revenue" \
              "python -u -m tools.service_management.service_schedule --step 3"
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more service jobs failed."
          fi

      - name: Commit logs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f logs
          if git diff --cached --quiet; then
            echo "No log changes"
          else
            git commit -m "Update service logs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
